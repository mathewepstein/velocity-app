<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velocity — Scoring</title>
  <link rel="stylesheet" href="/dashboard.css" />
</head>

<body class="{{if .Incognito}}incognito{{end}}">
  {{template "nav" .}}

  <div class="container">
    <header class="page">
      <div>
        <h1>Story-point scoring</h1>
        <div class="sub" id="score-summary">Loading…</div>
      </div>
      <div class="header-actions">
        <span class="run-status" id="run-status"></span>
        <button type="button" class="run-btn" id="run-generator"
          title="Re-band every post-hoc ticket (tickets with a merged PR) and persist the results.">Run generator</button>
      </div>
    </header>

    <div class="score-layout" id="score-layout">
      <section class="panel">
        <h2>Banded tickets <span class="meta" id="score-meta"></span></h2>
        <div class="score-filters" id="score-filters">
          <div class="facet">
            <span class="control-label">Flag</span>
            <div class="control-group" data-facet="flag">
              <button data-val="any">Any</button>
              <button data-val="needs" class="active">Needs insight</button>
              <button data-val="clean">Clean</button>
            </div>
          </div>
          <div class="facet">
            <span class="control-label">Confidence</span>
            <div class="control-group" data-facet="confidence">
              <button data-val="any" class="active">Any</button>
              <button data-val="high">High</button>
              <button data-val="medium">Med</button>
              <button data-val="low">Low</button>
            </div>
          </div>
          <div class="facet">
            <span class="control-label">Band</span>
            <div class="control-group" data-facet="band">
              <button data-val="any" class="active">Any</button>
              <button data-val="1">1</button>
              <button data-val="2">2</button>
              <button data-val="3">3</button>
              <button data-val="5">5</button>
              <button data-val="8">8</button>
              <button data-val="13">13</button>
            </div>
          </div>
          <div class="facet">
            <span class="control-label">Posted</span>
            <div class="control-group" data-facet="posted">
              <button data-val="any" class="active">Any</button>
              <button data-val="yes">Posted</button>
              <button data-val="no">Unposted</button>
            </div>
          </div>
          <div class="facet">
            <span class="control-label">Jira SP</span>
            <div class="control-group" data-facet="sp">
              <button data-val="any" class="active">Any</button>
              <button data-val="has">Has</button>
              <button data-val="none">None</button>
            </div>
          </div>
          <div class="facet">
            <span class="control-label">Source</span>
            <div class="control-group" data-facet="source">
              <button data-val="any" class="active">Any</button>
              <button data-val="auto">Auto</button>
              <button data-val="human">Override</button>
            </div>
          </div>
        </div>

        <div class="score-table" role="table" aria-label="Scored tickets">
          <div class="score-row score-head" role="row">
            <div role="columnheader" class="check-col">
              <input type="checkbox" id="select-all" aria-label="Select all filtered tickets" />
            </div>
            <div role="columnheader">Ticket</div>
            <div role="columnheader" class="num">Band</div>
            <div role="columnheader" class="num">Points</div>
            <div role="columnheader"></div>
            <div role="columnheader"></div>
            <div role="columnheader" class="num">Jira SP</div>
            <div role="columnheader"></div>
          </div>
          <div id="score-body"></div>
        </div>

        <div class="select-bar" id="select-bar" hidden>
          <span class="select-count" id="select-count">0 selected</span>
          <button type="button" class="copy-btn" id="clear-selection">Clear</button>
          <span class="spacer"></span>
          <button type="button" class="run-btn" id="post-selected" disabled
            title="Jira write-back is enabled after the token write-scope check (Phase 5 steps 2–4).">Post
            to Jira</button>
        </div>
      </section>

      <section class="panel" id="detail-panel" hidden>
        <h2><span>Ticket detail <span class="meta" id="detail-key"></span></span>
          <button type="button" class="detail-close" id="detail-close" aria-label="Close detail">×</button>
        </h2>
        <div id="detail-body"></div>
      </section>
    </div>

    <footer>
      <span id="footer-generated"></span>
    </footer>
  </div>

  <div class="loading" id="loading">Loading scores…</div>
  <div class="error" id="error" hidden>
    Could not load <code>/api/scoring/list</code>. Start the server with a
    scoring store and run <code>velocity score generate</code> first.
  </div>

  <script src="/util.js" defer></script>
  <script src="/scoring.js" defer></script>
</body>

</html>
